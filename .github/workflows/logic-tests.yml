name: Logic Tests

on:
  push:
    branches: ["master", "main", "dev"]
  pull_request:
    branches: ["master", "main", "dev"]

permissions:
  contents: read

jobs:
  run-logic-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ollama_proxy
            tests: >-
              ollama_proxy.tests.test_auth_guards
              ollama_proxy.tests.test_model_resolution
              ollama_proxy.tests.test_response_payload_parsing
              ollama_proxy.tests.test_tool_result_handling
              ollama_proxy.tests.test_wake_word_config
          - service: whisper_service
            tests: whisper_service.tests.test_service
          - service: deepface_service
            tests: deepface_service.tests.test_service
          - service: kitten_tts_service
            tests: kitten_tts_service.tests.test_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python test dependency
        run: python -m pip install --upgrade pip pyyaml

      - name: Run logic tests
        run: python -m unittest ${{ matrix.tests }}
