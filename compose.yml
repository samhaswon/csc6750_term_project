services:
  vshome:
    container_name: vshome
    build:
      context: ./vshome
    ports:
      - "8080:8080"
    restart: unless-stopped
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  mysql:
    container_name: deepface_mysql
    image: mysql:8.4
    environment:
      - MYSQL_DATABASE=deepface
      - MYSQL_USER=deepface
      - MYSQL_PASSWORD=deepface_password
      - MYSQL_ROOT_PASSWORD=deepface_root_password
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdeepface_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
  deepface_service:
    container_name: deepface_service
    build:
      context: ./deepface_service
    environment:
      - DEEPFACE_DATA_DIR=/data/deepface
      - DEEPFACE_ACCESS_FILE=/data/deepface/access.yaml
      - DEEPFACE_LOG_FILE=/data/deepface/auth.log
      - DEEPFACE_MODEL_NAME=Facenet512
      - DEEPFACE_DETECTOR_BACKEND=opencv
      - DEEPFACE_ENFORCE_DETECTION=false
      - DEEPFACE_MYSQL_HOST=mysql
      - DEEPFACE_MYSQL_PORT=3306
      - DEEPFACE_MYSQL_DATABASE=deepface
      - DEEPFACE_MYSQL_USER=deepface
      - DEEPFACE_MYSQL_PASSWORD=deepface_password
    volumes:
      - ./deepface_data:/data/deepface
    ports:
      - "8120:8120"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  ollama_proxy:
    container_name: ollama_proxy
    build:
      context: ./ollama_proxy
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    environment:
      - VSHOME_URL=http://vshome:8080
      - OLLAMA_URL=http://ollama:11434
      - DEEPFACE_URL=http://deepface_service:8120
      - KITTEN_TTS_URL=http://kitten_tts_service:8110
      - DEEPFACE_AUTH_KEY=a2ecd759be6bd340af29413cc7808f40f5884d2746ddba04d97c4b9fbe0a76ab
      # Model to use for Ollama
      - OLLAMA_MODEL=gemma4:e2b
      # When false, do not remap requested model tags to other family sizes.
      - OLLAMA_ALLOW_MODEL_FAMILY_FALLBACK=false
      # Context window size used in Ollama generate options.num_ctx
      - OLLAMA_CONTEXT_SIZE=4096
      # Hide tool_call and tool_result from dashboard/API generate output
      - HIDE_TOOL_CALL_RESULTS=true
      # Wake-word controls used by the web dashboard
      - WAKE_WORDS=hey home,ok home,hey Hal,ok Hal,computer
      - WAKE_COMMAND_TIMEOUT_MS=8000
    ports:
      - "8090:8090"
    depends_on:
      - vshome
      - deepface_service
      - kitten_tts_service
    restart: unless-stopped
  whisper_service:
    container_name: whisper_service
    build:
      context: ./whisper_service
    environment:
      # Common Whisper models: tiny, base, small, medium, large, turbo
      - WHISPER_MODEL=tiny
      - WHISPER_MODEL_DIR=/models/whisper
      - WHISPER_DEVICE=auto
      - MAX_UPLOAD_MB=50
    volumes:
      - whisper-model-data:/models/whisper
    ports:
      - "8100:8100"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  kitten_tts_service:
    container_name: kitten_tts_service
    build:
      context: ./kitten_tts_service
    environment:
      - KITTEN_MODEL=KittenML/kitten-tts-nano-0.8
      - KITTEN_MODEL_DIR=/models/kitten_tts
      - KITTEN_CACHE_DB=/data/kitten_tts/cache.sqlite3
      - KITTEN_DEVICE=auto
      - KITTEN_DEFAULT_VOICE=Bruno
      - MAX_INPUT_CHARS=5000
    volumes:
      - kitten-model-data:/models/kitten_tts
      - kitten-cache-data:/data/kitten_tts
    ports:
      - "8110:8110"
    restart: unless-stopped

volumes:
  ollama-data:
  mysql-data:
  whisper-model-data:
  kitten-model-data:
  kitten-cache-data:
