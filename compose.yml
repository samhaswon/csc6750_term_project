services:
  vshome:
    container_name: vshome
    build:
      context: ./vshome
    ports:
      - "8080:8080"
    restart: unless-stopped
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  ollama_proxy:
    container_name: ollama_proxy
    build:
      context: ./ollama_proxy
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    environment:
      - VSHOME_URL=http://vshome:8080
      - OLLAMA_URL=http://ollama:11434
      # Model to use for Ollama
      - OLLAMA_MODEL=gemma4:e2b
    ports:
      - "8090:8090"
    depends_on:
      - vshome
    restart: unless-stopped
  whisper_service:
    container_name: whisper_service
    build:
      context: ./whisper_service
    environment:
      # Common Whisper models: tiny, base, small, medium, large, turbo
      - WHISPER_MODEL=tiny
      - WHISPER_MODEL_DIR=/models/whisper
      - WHISPER_DEVICE=auto
      - MAX_UPLOAD_MB=50
    volumes:
      - whisper-model-data:/models/whisper
    ports:
      - "8100:8100"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  kitten_tts_service:
    container_name: kitten_tts_service
    build:
      context: ./kitten_tts_service
    environment:
      - KITTEN_MODEL=KittenML/kitten-tts-nano-0.8
      - KITTEN_MODEL_DIR=/models/kitten_tts
      - KITTEN_CACHE_DB=/data/kitten_tts/cache.sqlite3
      - KITTEN_DEVICE=auto
      - KITTEN_DEFAULT_VOICE=Bella
      - MAX_INPUT_CHARS=5000
    volumes:
      - kitten-model-data:/models/kitten_tts
      - kitten-cache-data:/data/kitten_tts
    ports:
      - "8110:8110"
    restart: unless-stopped

volumes:
  ollama-data:
  whisper-model-data:
  kitten-model-data:
  kitten-cache-data:
