services:
  vshome:
    container_name: vshome
    build:
      context: ./vshome
    ports:
      - "8080:8080"
    restart: unless-stopped
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  deepface_service:
    container_name: deepface_service
    build:
      context: ./deepface_service
    environment:
      - DEEPFACE_DATA_DIR=/data/deepface
      - DEEPFACE_ACCESS_FILE=/data/deepface/access.yaml
      - DEEPFACE_LOG_FILE=/data/deepface/auth.log
      - DEEPFACE_MODEL_NAME=Facenet512
      - DEEPFACE_DETECTOR_BACKEND=opencv
      - DEEPFACE_ENFORCE_DETECTION=false
    volumes:
      - ./deepface_data:/data/deepface
    ports:
      - "8120:8120"
    restart: unless-stopped
  ollama_proxy:
    container_name: ollama_proxy
    build:
      context: ./ollama_proxy
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    environment:
      - VSHOME_URL=http://vshome:8080
      - OLLAMA_URL=http://ollama:11434
      - DEEPFACE_URL=http://deepface_service:8120
      - KITTEN_TTS_URL=http://kitten_tts_service:8110
      # Model to use for Ollama
      - OLLAMA_MODEL=gemma4:e2b
      # Context window size used in Ollama generate options.num_ctx
      - OLLAMA_CONTEXT_SIZE=8192
      # Hide tool_call and tool_result from dashboard/API generate output
      - HIDE_TOOL_CALL_RESULTS=true
      # Wake-word controls used by the web dashboard
      - WAKE_WORDS=hey home,ok home,hey Hal,ok Hal
      - WAKE_COMMAND_TIMEOUT_MS=8000
    ports:
      - "8090:8090"
    depends_on:
      - vshome
      - deepface_service
      - kitten_tts_service
    restart: unless-stopped
  whisper_service:
    container_name: whisper_service
    build:
      context: ./whisper_service
    environment:
      # Common Whisper models: tiny, base, small, medium, large, turbo
      - WHISPER_MODEL=tiny
      - WHISPER_MODEL_DIR=/models/whisper
      - WHISPER_DEVICE=auto
      - MAX_UPLOAD_MB=50
    volumes:
      - whisper-model-data:/models/whisper
    ports:
      - "8100:8100"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  kitten_tts_service:
    container_name: kitten_tts_service
    build:
      context: ./kitten_tts_service
    environment:
      - KITTEN_MODEL=KittenML/kitten-tts-nano-0.8
      - KITTEN_MODEL_DIR=/models/kitten_tts
      - KITTEN_CACHE_DB=/data/kitten_tts/cache.sqlite3
      - KITTEN_DEVICE=auto
      - KITTEN_DEFAULT_VOICE=Bruno
      - MAX_INPUT_CHARS=5000
    volumes:
      - kitten-model-data:/models/kitten_tts
      - kitten-cache-data:/data/kitten_tts
    ports:
      - "8110:8110"
    restart: unless-stopped

volumes:
  ollama-data:
  whisper-model-data:
  kitten-model-data:
  kitten-cache-data:
