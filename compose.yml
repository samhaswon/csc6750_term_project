services:
  vshome:
    container_name: vshome
    build:
      context: ./vshome
    ports:
      - "8080:8080"
    restart: unless-stopped
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  ollama_proxy:
    container_name: ollama_proxy
    build:
      context: ./ollama_proxy
    environment:
      - VSHOME_URL=http://vshome:8080
      - OLLAMA_URL=http://ollama:11434
      # Model to use for Ollama
      - OLLAMA_MODEL=functiongemma:latest
    ports:
      - "8090:8090"
    depends_on:
      - vshome
    restart: unless-stopped
  whisper_service:
    container_name: whisper_service
    build:
      context: ./whisper_service
    environment:
      # Common Whisper models: tiny, base, small, medium, large, turbo
      - WHISPER_MODEL=tiny
      - WHISPER_MODEL_DIR=/models/whisper
      - WHISPER_DEVICE=auto
      - MAX_UPLOAD_MB=50
    volumes:
      - whisper-model-data:/models/whisper
    ports:
      - "8100:8100"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-data:
  whisper-model-data:
